name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "velo-core -> target"

      - name: Build and install (dev)
        run: |
          pip install maturin
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          maturin develop --manifest-path velo-core/Cargo.toml --extras dev

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "velo-core -> target"

      - name: Rust fmt
        run: cargo fmt --check --manifest-path velo-core/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path velo-core/Cargo.toml -- -D warnings

      - name: Install Python linters
        run: pip install ruff black

      - name: Ruff
        run: ruff check velo/

      - name: Black
        run: black --check velo/
