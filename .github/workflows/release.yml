name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # required for PyPI trusted publishing

jobs:
  # ── Build wheels for each platform ────────────────────────────────────────

  build-linux-x86:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: auto
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist/

  build-linux-aarch64:
    name: Linux aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: auto
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: dist/

  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-universal2
          path: dist/

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist/

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/

  # ── Publish all wheels to PyPI ─────────────────────────────────────────────

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86
      - build-linux-aarch64
      - build-macos
      - build-windows
      - build-sdist
    environment:
      name: pypi
      url: https://pypi.org/p/velo-py
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI trusted publishing (OIDC) — no token needed.
        # Configure at: https://pypi.org/manage/account/publishing/
